name: QA-Z Pull Request Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  QA_Z_INSTALL: "git+https://github.com/your-org/qa-z.git"

jobs:
  fast-gate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QA-Z
        run: python -m pip install "$QA_Z_INSTALL"

      - name: Run fast checks
        run: qa-z fast

  deep-gate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    needs: fast-gate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QA-Z
        run: python -m pip install "$QA_Z_INSTALL"

      - name: Run deep checks
        run: qa-z deep
