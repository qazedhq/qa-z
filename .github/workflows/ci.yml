name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

  fast:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e .[dev]

      - name: Run QA-Z fast gate
        run: python -m qa_z fast --output-dir .qa-z/runs/ci

      - name: Write QA-Z GitHub summary
        if: always()
        run: python -m qa_z github-summary --from-run .qa-z/runs/ci >> "$GITHUB_STEP_SUMMARY"
