name: Bug report
description: Report a QA-Z defect with deterministic evidence.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve QA-Z. Please include command output or artifact paths so the issue is reproducible.
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
      placeholder: qa-z fast returned failed even though...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should QA-Z have done?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Include the exact command and working directory.
      render: bash
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Deterministic evidence
      description: Include relevant artifact paths, summary fields, or short output excerpts.
      placeholder: .qa-z/runs/<run-id>/fast/summary.json
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, QA-Z version or commit, and relevant tool versions.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary checks
      options:
        - label: This report does not require live Codex, Claude, or other model execution.
          required: true
        - label: This report includes deterministic evidence instead of LLM-only judgment.
          required: true
        - label: I did not include real secrets or credentials.
          required: true
