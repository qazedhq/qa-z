{
  "project": {"name": "deep-exclude-paths", "languages": ["python"]},
  "contracts": {"output_dir": "qa/contracts"},
  "fast": {"output_dir": ".qa-z/runs", "checks": []},
  "deep": {
    "fail_on_missing_tool": true,
    "selection": {"exclude_paths": ["vendor/**"]},
    "checks": [
      {
        "id": "sg_scan",
        "enabled": true,
        "run": ["python", ".qa-z-benchmark/fake_semgrep.py"],
        "kind": "static-analysis",
        "semgrep": {
          "config": "auto",
          "fail_on_severity": ["ERROR"]
        }
      }
    ]
  }
}
